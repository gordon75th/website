<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💌 For You, Anika</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat&family=Pacifico&display=swap" rel="stylesheet"/>
  <style>
    body {
      background: linear-gradient(to top, #ffe0f0, #fff0f6);
      font-family: 'Caveat', cursive;
      padding: 40px;
      text-align: center;
      color: #c9184a;
    }

    .love-letter {
      max-width: 600px;
      margin: 0 auto;
      background: #fff6fa;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      font-size: 1.3rem;
      position: relative;
    }

    .letter-title {
      font-family: 'Pacifico', cursive;
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    .back-btn {
      margin-top: 30px;
      display: inline-block;
      font-size: 1.2rem;
      padding: 10px 20px;
      background: #ffb3c6;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Pacifico', cursive;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .hearts {
      font-size: 2rem;
      animation: floatHearts 3s ease-in-out infinite alternate;
      position: absolute;
      top: -10px;
      right: 20px;
    }

    @keyframes floatHearts {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-20px); opacity: 0.7; }
    }
  </style>
  <link href="css/auth.css" rel="stylesheet">
  <script src="js/auth.js" defer></script>
</head>
<body>
  <div class="love-letter">
    <div class="hearts">💕💖💘</div>
    <h1 class="letter-title">Es ist offiziel, unser Beziehungsbebbiii ist 3 Monate alt...</h1>
    <p>
      TEXT. <br/>
      ...
      <br>
      <br>
      ...

      <br>
      <br>
      ...
      <br>
      <br>
      ...
      <br>
      <br>
      ...
      
      <br>
      <br>
      ...<br/>
      ... <br/><br/>
    </p>

    <p style="margin-top: 30px; font-size: 1.5rem;">
      >....
    </p>

    <a href="index.html" class="back-btn">← Back to the Garden</a>
  </div>
</body>
</html>
